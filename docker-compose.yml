services:
  postgres:
    image: postgres:17
    container_name: grog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vulnmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grog-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vulnmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: grog-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=grog-observability
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - grog-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: grog-logstash
    restart: unless-stopped
    volumes:
      - ./observability/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "9600:9600"
    networks:
      - grog-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:9600/_node/stats >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: grog-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    networks:
      - grog-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grog-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/vulnmanager
      DB_USER: postgres
      DB_PASSWORD: postgres
      OPENAPI_OUTPUT_DIR: /app/docs
      LOGS_DIR: /app/logs
      SERVICE_NAME: vulnerability-manager
      ENV: docker
      LOGSTASH_ENABLED: "true"
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5044"
      METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - grog-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: grog-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - grog-net
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grog-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - grog-net
    depends_on:
      - prometheus
      - elasticsearch

networks:
  grog-net:
    driver: bridge

volumes:
  postgres_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
