groups:
  - name: vulnerability-manager-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(ktor_http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(ktor_http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: vulnerability-manager
        annotations:
          summary: High HTTP 5xx error rate
          description: More than 5% of requests returned 5xx over the last 5 minutes.

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(ktor_http_server_requests_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
          service: vulnerability-manager
        annotations:
          summary: High API latency (p95 > 1s)
          description: 95th percentile request latency exceeded 1 second.

      - alert: ApiTargetDown
        expr: up{job="vulnerability-manager-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: vulnerability-manager
        annotations:
          summary: Vulnerability Manager API is down
          description: Prometheus cannot scrape /metrics from the API target.

      - alert: High4xxRate
        expr: |
          (
            sum(rate(ktor_http_server_requests_seconds_count{status=~"4.."}[5m]))
            /
            sum(rate(ktor_http_server_requests_seconds_count[5m]))
          ) > 0.20
        for: 5m
        labels:
          severity: warning
          service: vulnerability-manager
        annotations:
          summary: High HTTP 4xx error rate
          description: More than 20% of requests returned 4xx over the last 5 minutes.
