input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if "_jsonparsefailure" in [tags] {
    drop { }
  }

  if [message] == "request completed" or [message] == "request failed" {
    mutate {
      add_field => { "event_type" => "http_access" }
    }
  }

  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  } else if ![@timestamp] {
    ruby {
      code => "event.set('@timestamp', LogStash::Timestamp.new(Time.now))"
    }
  }

  if [status] {
    mutate {
      convert => { "status" => "integer" }
    }
  }

  if [durationMs] {
    mutate {
      convert => { "durationMs" => "integer" }
    }
  }

  if ![service] {
    mutate {
      add_field => { "service" => "vulnerability-manager" }
    }
  }

  if ![environment] {
    mutate {
      add_field => { "environment" => "docker" }
    }
  }

  mutate {
    add_field => { "[@metadata][index_prefix]" => "vulnerability-manager-logs" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }
}
